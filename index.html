<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Theorem Cinema 3D</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        #void-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 50; transition: opacity 4s ease-in-out; pointer-events: none; }
        #white-transition { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 15; opacity: 0; pointer-events: none; transition: opacity 1.5s ease-in-out; }

        #dpad-new { position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px; z-index: 10; transition: opacity 0.5s; touch-action: none; }
        .dir-btn { position: absolute; width: 46px; height: 46px; display: flex; justify-content: center; align-items: center; font-size: 18px; color: #fff; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5); backdrop-filter: blur(4px); transition: 0.1s; cursor: pointer; }
        .dir-btn.active { background: #fff; color: #000; box-shadow: 0 0 20px #fff; transform: scale(0.95); }
        #btn-u { top: 0; left: 47px; }
        #btn-d { bottom: 0; left: 47px; }
        #btn-l { top: 47px; left: 0; }
        #btn-r { top: 47px; right: 0; }

        #dom-play-overlay { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); z-index: 20; color: white; font-size: 16px; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 10px #fff; background: transparent; border: none; cursor: pointer; display: none; white-space: nowrap; }

        #video-controls { position: absolute; bottom: 30px; right: 30px; z-index: 5; display: none; }
        .vid-btn { padding: 15px; background: rgba(255,255,255,0.2); border: 2px solid #fff; color: #fff; font-weight: bold; cursor: pointer; border-radius: 50%; width: 70px; height: 70px; display: flex; justify-content: center; align-items: center; text-align: center; font-size: 14px; box-shadow: 0 0 15px rgba(255,255,255,0.5); }
        .vid-btn:active { background: #fff; color: #000; }
        
        #watermark { position: absolute; top: 15px; right: 15px; color: #ffffff; font-size: 14px; font-weight: bold; z-index: 5; }
    </style>
</head>
<body>

    <audio id="bgm" src="cinema.mp3" loop></audio>
    <div id="void-overlay"></div>
    <div id="white-transition"></div>
    <div id="canvas-container"></div>

    <div id="dpad-new">
        <div class="dir-btn" id="btn-u">▲</div>
        <div class="dir-btn" id="btn-d">▼</div>
        <div class="dir-btn" id="btn-l">◄</div>
        <div class="dir-btn" id="btn-r">►</div>
    </div>
    
    <div id="dom-play-overlay">TAP TO PLAY</div>

    <div id="video-controls">
        <div class="vid-btn" id="btn-next">NEXT<br>►</div>
    </div>

    <div id="watermark">@TheoremCinema</div>

    <video id="cinema-video" crossOrigin="anonymous" playsinline style="display:none;"></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script>
        let scene, camera, renderer, clock;
        let hallwayGroup = new THREE.Group();
        let cinemaGroup = new THREE.Group();
        
        let moveState = { f: 0, b: 0, l: 0, r: 0 }, velocity = new THREE.Vector3();
        let touchLookID = null, tLookLast = { x: 0, y: 0 };
        
        let inCinemaRoom = false, isTransitioning = false;
        
        // --- BULLETPROOF AUDIO ENGINE ---
        let audioStarted = false;
        window.forcePlayAudio = () => {
            if (audioStarted || inCinemaRoom) return; // Don't play if we are in the cinema
            const bgm = document.getElementById('bgm');
            bgm.play().then(() => { audioStarted = true; }).catch(e => { console.log("Audio blocked by browser", e); });
        };
        window.addEventListener('click', window.forcePlayAudio);
        window.addEventListener('touchstart', window.forcePlayAudio);
        window.addEventListener('touchend', window.forcePlayAudio);

        const CORRIDOR_WIDTH = 40, CORRIDOR_LENGTH = 200, WALL_H = 25, EYE_H = 4;
        
        const videoElement = document.getElementById('cinema-video');
        let videoTexture, videoScreenMesh;
        let currentVideoIndex = 0;
        
        const videoList = [
            "vid1.mp4", "vid2.mp4", "vid3.mp4", "vid4.mp4", 
            "vid5.mp4", "vid6.mp4", "vid7.mp4", "vid8.mp4"
        ];

        initThreeJS();

        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, EYE_H, 40); 
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 1.2));

            buildHallway();
            buildCinemaRoom();
            setupControls();

            setTimeout(() => {
                document.getElementById('void-overlay').style.opacity = 0;
                setTimeout(() => document.getElementById('void-overlay').style.display = 'none', 4000);
            }, 500);

            animate();
        }
        function createTextTexture(txt) {
            const c = document.createElement('canvas'); 
            c.width = 1024; c.height = 256; 
            const ctx = c.getContext('2d');
            ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0,0,1024,256);
            ctx.font = "bold 120px 'Courier New'"; 
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(txt, 512, 128);
            const tex = new THREE.CanvasTexture(c);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return tex;
        }

        function buildHallway() {
            scene.add(hallwayGroup);
            const texLoader = new THREE.TextureLoader();
            
            const tileTex = texLoader.load('imgf.jpg');
            tileTex.wrapS = tileTex.wrapT = THREE.RepeatWrapping;
            tileTex.repeat.set(CORRIDOR_WIDTH / 10, CORRIDOR_LENGTH / 10);
            const archMat = new THREE.MeshBasicMaterial({ map: tileTex, color: 0xffffff });

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(CORRIDOR_WIDTH, CORRIDOR_LENGTH), archMat);
            floor.rotation.x = -Math.PI/2; floor.position.z = -CORRIDOR_LENGTH/2 + 50; hallwayGroup.add(floor);

            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(CORRIDOR_WIDTH, CORRIDOR_LENGTH), archMat);
            ceil.rotation.x = Math.PI/2; ceil.position.set(0, WALL_H, -CORRIDOR_LENGTH/2 + 50); hallwayGroup.add(ceil);

            const wallMat = new THREE.MeshBasicMaterial({ map: tileTex, color: 0xcccccc });
            const wLeft = new THREE.Mesh(new THREE.PlaneGeometry(CORRIDOR_LENGTH, WALL_H), wallMat);
            wLeft.rotation.y = Math.PI/2; wLeft.position.set(-CORRIDOR_WIDTH/2, WALL_H/2, -CORRIDOR_LENGTH/2 + 50); hallwayGroup.add(wLeft);
            
            const wRight = new THREE.Mesh(new THREE.PlaneGeometry(CORRIDOR_LENGTH, WALL_H), wallMat);
            wRight.rotation.y = -Math.PI/2; wRight.position.set(CORRIDOR_WIDTH/2, WALL_H/2, -CORRIDOR_LENGTH/2 + 50); hallwayGroup.add(wRight);

            const wBack = new THREE.Mesh(new THREE.PlaneGeometry(CORRIDOR_WIDTH, WALL_H), wallMat);
            wBack.position.set(0, WALL_H/2, 50); wBack.rotation.y = Math.PI; hallwayGroup.add(wBack);

            // MASSIVE Wall Feature (imgwf.jpg) 
            const giantGroup = new THREE.Group();
            giantGroup.position.set(-CORRIDOR_WIDTH/2 + 0.6, WALL_H/2, -10); 
            giantGroup.rotation.y = Math.PI/2;
            
            const giantFrame = new THREE.Mesh(new THREE.PlaneGeometry(56, 26), new THREE.MeshBasicMaterial({ color: 0x050505 }));
            giantFrame.position.z = -0.1;
            const giantMesh = new THREE.Mesh(new THREE.PlaneGeometry(54, 25), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            texLoader.load('imgwf.jpg', t => { giantMesh.material.map = t; giantMesh.material.needsUpdate = true; });
            
            giantGroup.add(giantFrame); giantGroup.add(giantMesh);
            hallwayGroup.add(giantGroup);

            // Movie Posters with Black Frames
            const posters = ['imga1.jpg','imga2.jpg'];
            posters.forEach((src, i) => {
                const group = new THREE.Group(); 
                const isLeft = i === 0; 
                group.position.set(isLeft ? -CORRIDOR_WIDTH/2 + 0.5 : CORRIDOR_WIDTH/2 - 0.5, 13, -75);
                group.rotation.y = isLeft ? Math.PI/2 : -Math.PI/2;
                
                const blackFrame = new THREE.Mesh(new THREE.PlaneGeometry(12.5, 18.5), new THREE.MeshBasicMaterial({ color: 0x050505 }));
                blackFrame.position.z = -0.1;
                const poster = new THREE.Mesh(new THREE.PlaneGeometry(12, 18), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                texLoader.load(src, t => { poster.material.map = t; poster.material.needsUpdate = true; });
                
                group.add(blackFrame); group.add(poster);
                hallwayGroup.add(group);
            });

            // MASSIVE Credits Board (imgcc.jpg)
            const ccGroup = new THREE.Group();
            ccGroup.position.set(CORRIDOR_WIDTH/2 - 0.6, 13, -115); // On the right wall
            ccGroup.rotation.y = -Math.PI/2;

            const ccFrame = new THREE.Mesh(new THREE.PlaneGeometry(31, 31), new THREE.MeshBasicMaterial({ color: 0x050505 }));
            ccFrame.position.z = -0.1;
            const ccMesh = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            texLoader.load('imgcc.jpg', t => { ccMesh.material.map = t; ccMesh.material.needsUpdate = true; });
            
            ccGroup.add(ccFrame); ccGroup.add(ccMesh);
            hallwayGroup.add(ccGroup);

            // Glowing Doorway
            const doorGroup = new THREE.Group();
            doorGroup.position.set(0, 0, -145);
            
            const doorFrameMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
            const frameLeft = new THREE.Mesh(new THREE.BoxGeometry(2, 16, 2), doorFrameMat);
            frameLeft.position.set(-8, 8, 0);
            const frameRight = new THREE.Mesh(new THREE.BoxGeometry(2, 16, 2), doorFrameMat);
            frameRight.position.set(8, 8, 0);
            const frameTop = new THREE.Mesh(new THREE.BoxGeometry(18, 2, 2), doorFrameMat);
            frameTop.position.set(0, 17, 0);
            
            const doorText = new THREE.Mesh(new THREE.PlaneGeometry(24, 6), new THREE.MeshBasicMaterial({ map: createTextTexture("MOVIE ROOM"), transparent: true }));
            doorText.position.set(0, 22, 0);
            
            const glowDoor = new THREE.Mesh(new THREE.PlaneGeometry(14, 16), new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide }));
            glowDoor.position.set(0, 8, 0.5);

            doorGroup.add(frameLeft); doorGroup.add(frameRight); doorGroup.add(frameTop); doorGroup.add(doorText); doorGroup.add(glowDoor);
            hallwayGroup.add(doorGroup);
        }

        function buildCinemaRoom() {
            scene.add(cinemaGroup);
            cinemaGroup.position.set(0, 0, -500); 
            cinemaGroup.visible = false;
            const texLoader = new THREE.TextureLoader();

            const roomMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            texLoader.load('imgcinema.jpg', t => { roomMat.map = t; roomMat.needsUpdate = true; });
            const roomPlane = new THREE.Mesh(new THREE.PlaneGeometry(160, 160), roomMat);
            roomPlane.position.set(0, 50, -100); 
            cinemaGroup.add(roomPlane);

            videoTexture = new THREE.VideoTexture(videoElement);
            videoTexture.minFilter = THREE.LinearFilter;
            videoTexture.magFilter = THREE.LinearFilter;
            
            const screenGeo = new THREE.PlaneGeometry(145, 65);
            const screenMat = new THREE.MeshBasicMaterial({ map: videoTexture });
            videoScreenMesh = new THREE.Mesh(screenGeo, screenMat);
            videoScreenMesh.position.set(0, 75, -99.5); 
            cinemaGroup.add(videoScreenMesh);
        }
                function setupControls() {
            // Sleek Button Bindings (Now forcing audio on touch)
            const bind = (id, k, v) => {
                const b = document.getElementById(id);
                b.addEventListener('touchstart', (e) => { 
                    e.preventDefault(); 
                    window.forcePlayAudio(); // Force audio on D-Pad touch
                    if(!inCinemaRoom) moveState[k] = v; 
                    b.classList.add('active'); 
                }, {passive: false});
                b.addEventListener('touchend', (e) => { e.preventDefault(); moveState[k] = 0; b.classList.remove('active'); }, {passive: false});
                b.addEventListener('mousedown', () => { 
                    window.forcePlayAudio(); 
                    if(!inCinemaRoom) moveState[k] = v; 
                    b.classList.add('active'); 
                });
                b.addEventListener('mouseup', () => { moveState[k] = 0; b.classList.remove('active'); });
                b.addEventListener('mouseleave', () => { moveState[k] = 0; b.classList.remove('active'); });
            };
            bind('btn-u','f',1); bind('btn-d','b',1); bind('btn-l','l',1); bind('btn-r','r',1);

            // Camera Look controls
            const cvs = document.getElementById('canvas-container');
            cvs.addEventListener('touchstart', (e) => {
                window.forcePlayAudio(); // Force audio on Screen swipe
                if(touchLookID === null) {
                    const t = e.changedTouches[0]; 
                    touchLookID = t.identifier; 
                    tLookLast = {x: t.clientX, y: t.clientY};
                }
            }, {passive: false});

            cvs.addEventListener('touchmove', (e) => {
                if(e.cancelable) e.preventDefault(); 
                for(let t of e.changedTouches) {
                    if(t.identifier === touchLookID) {
                        camera.rotation.y -= (t.clientX - tLookLast.x) * 0.005;
                        camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x - (t.clientY - tLookLast.y) * 0.005));
                        tLookLast = {x: t.clientX, y: t.clientY};
                    }
                }
            }, {passive: false});

            cvs.addEventListener('touchend', (e) => {
                for(let t of e.changedTouches) { if(t.identifier === touchLookID) touchLookID = null; }
            });

            // Cinema room interactivity - pause video by tapping screen
            cvs.addEventListener('click', (e) => {
                if(inCinemaRoom) {
                    const mouse = new THREE.Vector2((e.clientX/window.innerWidth)*2-1, -(e.clientY/window.innerHeight)*2+1);
                    const ray = new THREE.Raycaster(); ray.setFromCamera(mouse, camera);
                    const hits = ray.intersectObject(videoScreenMesh, false);
                    if(hits.length > 0 && !videoElement.paused) {
                        videoElement.pause();
                        document.getElementById('dom-play-overlay').style.display = 'block'; 
                    }
                }
            });

            const playOverlay = document.getElementById('dom-play-overlay');
            const nextBtn = document.getElementById('btn-next');

            playOverlay.addEventListener('click', (e) => {
                e.stopPropagation(); 
                videoElement.muted = false;
                if(videoElement.src === "" || videoElement.error) {
                    videoElement.src = videoList[currentVideoIndex];
                }
                videoElement.play().then(() => {
                    playOverlay.style.display = 'none'; 
                }).catch(err => console.log("Make sure you added vid1.mp4 to your folder!", err));
            });

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                currentVideoIndex = (currentVideoIndex + 1) % videoList.length;
                videoElement.src = videoList[currentVideoIndex];
                videoElement.load();
                videoElement.muted = false;
                videoElement.play().then(() => {
                    playOverlay.style.display = 'none'; 
                }).catch(err => {
                    playOverlay.style.display = 'block'; 
                    console.log("Video not found locally. Add vid1.mp4 to vid8.mp4 in TrebEdit");
                });
            });
        }

        function checkTransition() {
            if(isTransitioning || inCinemaRoom) return;
            if(camera.position.z < -135) {
                isTransitioning = true;
                const whiteTrans = document.getElementById('white-transition');
                whiteTrans.style.opacity = 1;
                
                const audio = document.getElementById('bgm');
                const fade = setInterval(() => { 
                    if(audio.volume > 0.05) {
                        audio.volume -= 0.05; 
                    } else { 
                        audio.pause(); 
                        clearInterval(fade); 
                    } 
                }, 100);

                setTimeout(() => {
                    inCinemaRoom = true;
                    hallwayGroup.visible = false;
                    cinemaGroup.visible = true;
                    
                    camera.position.set(0, EYE_H, -450); 
                    camera.rotation.set(0, 0, 0); 
                    
                    document.getElementById('dpad-new').style.display = 'none';
                    document.getElementById('video-controls').style.display = 'block';
                    document.getElementById('watermark').style.display = 'none'; 

                    const overlay = document.getElementById('dom-play-overlay');
                    overlay.style.display = 'block'; 

                    whiteTrans.style.opacity = 0;
                    isTransitioning = false;
                }, 1500);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if(!inCinemaRoom && !isTransitioning) {
                velocity.z -= (moveState.f - moveState.b) * 150 * delta; 
                velocity.x -= (moveState.l - moveState.r) * 150 * delta; 
                velocity.multiplyScalar(0.85); 
                
                camera.translateZ(velocity.z * delta);
                camera.translateX(velocity.x * delta);
                camera.position.y = EYE_H;
                
                const bX = CORRIDOR_WIDTH/2 - 2;
                camera.position.clamp(new THREE.Vector3(-bX, EYE_H, -140), new THREE.Vector3(bX, EYE_H, 45));
                
                checkTransition();
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
